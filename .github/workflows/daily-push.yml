name: Daily Push Notifications

on:
  schedule:
    - cron: '0 7 * * *'   # 09:00 España (UTC+2 verano) / 08:00 (UTC+1 invierno)
  workflow_dispatch:        # Permite lanzarlo manualmente desde GitHub Actions

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install
        working-directory: .github/push-sender

      - name: Enviar notificaciones push
        env:
          VAPID_PUBLIC_KEY:         ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY:        ${{ secrets.VAPID_PRIVATE_KEY }}
          FIREBASE_DATABASE_URL:    ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node send-push.js
        working-directory: .github/push-sender
